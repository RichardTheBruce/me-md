<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>me.md · neural net</title>
    <style>
      :root {
        --ink: #e9e2cf;
        --dim: #8c8a7e;
        --panel: rgba(14, 13, 11, 0.72);
        --edge: rgba(120, 110, 90, 0.5);
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: #050505;
        color: var(--ink);
        font: 13px/1.5 ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }
      #stage { position: fixed; inset: 0; display: block; }

      .hud { position: fixed; z-index: 10; user-select: none; }

      /* top-left identity + version */
      #ident { top: 18px; left: 20px; max-width: 42vw; }
      #ident .title { font-size: 15px; letter-spacing: 0.18em; color: var(--ink); }
      #ident .title b { color: #ffcf6b; font-weight: 600; }
      #ident .meta { margin-top: 4px; color: var(--dim); font-size: 11px; letter-spacing: 0.04em; }
      #ident .meta span { color: #cdbf99; }

      /* top-right control crystal */
      #crystal {
        top: 18px; right: 20px; width: 208px;
        background: var(--panel);
        border: 1px solid rgba(255, 207, 107, 0.16);
        border-radius: 12px;
        padding: 14px 14px 16px;
        backdrop-filter: blur(8px);
      }
      #crystal .cap {
        display: flex; align-items: center; justify-content: space-between;
        letter-spacing: 0.26em; font-size: 11px; color: #cdbf99; margin-bottom: 12px;
      }
      #themeDot {
        width: 18px; height: 18px; border-radius: 50%; cursor: pointer;
        border: 1px solid rgba(255,255,255,0.25);
        background: radial-gradient(circle at 35% 30%, #ffe6a3, #ff9d3c 55%, #6f3d12);
        box-shadow: 0 0 10px rgba(255,180,80,0.55);
        transition: box-shadow 0.3s, background 0.3s;
      }
      .ctl { margin-bottom: 12px; }
      .ctl:last-child { margin-bottom: 0; }
      .ctl label {
        display: flex; justify-content: space-between;
        color: var(--dim); font-size: 11px; letter-spacing: 0.08em; margin-bottom: 6px;
      }
      .ctl label b { color: #e9e2cf; font-weight: 500; }
      input[type="range"] {
        -webkit-appearance: none; appearance: none; width: 100%; height: 3px;
        border-radius: 3px; background: rgba(255, 207, 107, 0.22); outline: none;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none; appearance: none; width: 13px; height: 13px;
        border-radius: 50%; background: #ffcf6b; cursor: pointer;
        box-shadow: 0 0 8px rgba(255, 207, 107, 0.8);
      }
      input[type="range"]::-moz-range-thumb {
        width: 13px; height: 13px; border: none; border-radius: 50%;
        background: #ffcf6b; cursor: pointer; box-shadow: 0 0 8px rgba(255, 207, 107, 0.8);
      }

      /* bottom-center transport */
      #transport {
        bottom: 26px; left: 50%; transform: translateX(-50%);
        display: flex; gap: 10px;
      }
      .btn {
        font: inherit; letter-spacing: 0.22em; font-size: 11px;
        color: #e9e2cf; background: var(--panel);
        border: 1px solid rgba(255, 207, 107, 0.22); border-radius: 999px;
        padding: 10px 22px; cursor: pointer; backdrop-filter: blur(8px);
        transition: border-color 0.2s, color 0.2s, box-shadow 0.2s, background 0.2s;
      }
      .btn:hover { border-color: rgba(255, 207, 107, 0.6); color: #fff; }
      .btn.primary { color: #ffcf6b; border-color: rgba(255, 207, 107, 0.5); }
      .btn.primary:hover { box-shadow: 0 0 22px rgba(255, 180, 80, 0.4); }
      .btn.on { color: #66ffd0; border-color: rgba(102, 255, 208, 0.5); }

      /* hover tooltip */
      #tip {
        position: fixed; z-index: 12; pointer-events: none; opacity: 0;
        transform: translate(-50%, -120%);
        background: rgba(8, 8, 7, 0.92); border: 1px solid rgba(255, 207, 107, 0.3);
        border-radius: 8px; padding: 7px 10px; max-width: 320px;
        transition: opacity 0.12s; white-space: nowrap;
      }
      #tip .t { color: #ffcf6b; }
      #tip .g { color: var(--dim); font-size: 11px; }
      #tip .p { color: #9a948a; font-size: 10px; overflow: hidden; text-overflow: ellipsis; }

      /* bottom-left chat panel: talk to your brain, watch it grow */
      #chat {
        bottom: 26px; left: 20px; width: 322px; max-width: 42vw;
        background: var(--panel);
        border: 1px solid rgba(255, 207, 107, 0.16);
        border-radius: 12px;
        backdrop-filter: blur(8px);
        display: flex; flex-direction: column; overflow: hidden;
      }
      #chat .cap {
        display: flex; align-items: center; justify-content: space-between;
        letter-spacing: 0.22em; font-size: 11px; color: #cdbf99;
        padding: 12px 14px; cursor: pointer; user-select: none;
      }
      #chat .cap .dot { font-size: 9px; color: #66ffd0; text-shadow: 0 0 8px rgba(102,255,208,0.7); }
      #chat .cap .dot.off { color: #6f6a60; text-shadow: none; }
      #chat.collapsed #chatBody { display: none; }
      #chatBody { display: flex; flex-direction: column; min-height: 0; }
      #chatLog {
        padding: 2px 14px 8px; overflow-y: auto; max-height: 34vh;
        display: flex; flex-direction: column; gap: 9px;
      }
      #chatLog .msg .who { font-size: 9px; letter-spacing: 0.14em; color: var(--dim); margin-bottom: 2px; }
      #chatLog .msg .bubble { white-space: pre-wrap; word-break: break-word; line-height: 1.5; }
      #chatLog .msg.you .bubble { color: #e9e2cf; }
      #chatLog .msg.me .bubble { color: #ffcf6b; }
      #chatLog .hintline { color: #6f6a60; font-size: 11px; line-height: 1.5; }
      #chatForm {
        display: flex; gap: 8px; padding: 10px 12px 12px;
        border-top: 1px solid rgba(255, 207, 107, 0.12);
      }
      #chatInput {
        flex: 1; font: inherit; color: var(--ink); min-width: 0;
        background: rgba(0, 0, 0, 0.35); border: 1px solid rgba(255, 207, 107, 0.2);
        border-radius: 8px; padding: 8px 10px; outline: none;
      }
      #chatInput:focus { border-color: rgba(255, 207, 107, 0.5); }
      #chatSend {
        font: inherit; font-size: 11px; letter-spacing: 0.16em; color: #ffcf6b;
        background: transparent; border: 1px solid rgba(255, 207, 107, 0.4);
        border-radius: 8px; padding: 0 14px; cursor: pointer;
        transition: box-shadow 0.2s, opacity 0.2s;
      }
      #chatSend:hover { box-shadow: 0 0 16px rgba(255, 180, 80, 0.35); }
      #chatSend:disabled { opacity: 0.45; cursor: default; box-shadow: none; }
      /* grow toast */
      #grew {
        position: fixed; left: 20px; bottom: 92px; z-index: 12;
        color: #66ffd0; font-size: 12px; letter-spacing: 0.06em; pointer-events: none;
        opacity: 0; transform: translateY(6px); transition: opacity 0.3s, transform 0.3s;
        text-shadow: 0 0 12px rgba(102, 255, 208, 0.6);
      }
      #grew.show { opacity: 1; transform: translateY(0); }

      /* hint + boot/error overlays */
      #hint {
        position: fixed; bottom: 26px; right: 22px; z-index: 10;
        color: #6f6a60; font-size: 11px; letter-spacing: 0.05em; text-align: right;
      }
      #curtain {
        position: fixed; inset: 0; z-index: 30; display: flex;
        align-items: center; justify-content: center; flex-direction: column;
        background: #050505; color: #cdbf99; gap: 10px; text-align: center; padding: 24px;
      }
      #curtain .big { font-size: 15px; letter-spacing: 0.22em; }
      #curtain .sub { color: #6f6a60; font-size: 12px; max-width: 440px; }
      .spark { color: #ffcf6b; animation: pulse 1.4s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>

    <div id="ident" class="hud">
      <div class="title">me<b>.md</b> · neural net</div>
      <div class="meta" id="version">booting…</div>
      <div class="meta" id="counts"></div>
    </div>

    <div id="crystal" class="hud">
      <div class="cap"><span>CRYSTAL</span><div id="themeDot" title="toggle palette"></div></div>
      <div class="ctl">
        <label>density <b id="densityVal">100%</b></label>
        <input type="range" id="density" min="0" max="100" value="100" />
      </div>
      <div class="ctl">
        <label>glow <b id="glowVal">120%</b></label>
        <input type="range" id="glow" min="20" max="240" value="120" />
      </div>
    </div>

    <div id="transport" class="hud">
      <button class="btn primary" id="morph">MORPH</button>
      <button class="btn" id="freeze">FREEZE</button>
      <button class="btn" id="reset">RESET</button>
    </div>

    <div id="tip"><div class="t"></div><div class="g"></div><div class="p"></div></div>
    <div id="hint" class="hud">drag to navigate · scroll to zoom · morph to reshape</div>

    <div id="chat" class="hud">
      <div class="cap" id="chatCap">
        <span>TALK TO YOUR BRAIN</span>
        <span class="dot off" id="chatDot" title="engine status">●</span>
      </div>
      <div id="chatBody">
        <div id="chatLog">
          <div class="hintline">say anything: every message becomes a star in your net.</div>
        </div>
        <form id="chatForm">
          <input id="chatInput" type="text" autocomplete="off" placeholder="talk to yourself…" />
          <button id="chatSend" type="submit">SEND</button>
        </form>
      </div>
    </div>
    <div id="grew">✦ your net grew</div>

    <div id="curtain">
      <div class="big">waking the net<span class="spark"> ◇</span></div>
      <div class="sub" id="curtainSub">projecting your world into three dimensions…</div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
