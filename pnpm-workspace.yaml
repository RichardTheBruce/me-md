# me.md is a "core + auto-detect + 3 names" monorepo.
#
# The ROOT package (me.md) is the whole engine: orchestrator, tiers, sentinel,
# loop verifier, RAG, MCP. On `me up` it auto-detects your hardware and picks
# the tier. The two packages below are THIN aliases: they install the same
# core and just pin a bigger tier by default, for people who already know they
# have the iron and don't want auto-detect second-guessing them.
#
#   me.md      -> auto-detect (laptop/desktop, 1 GPU 24-48GB class)
#   megame.md  -> pinned mega tier (~128 GB class)
#   gigame.md  -> pinned giga tier (256 GB+ class)
#
# Same code in all three. `pnpm install` links the root core into each alias.
packages:
  - "packages/*"
